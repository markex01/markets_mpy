[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aurora_forecasts"
version = "0.1.0"
description = "Forecast retrieval and processing utilities for Aurora data."
requires-python = "==3.10.*"
authors = [
  {name = "Mikel Perez"}
]
dependencies = [
  "pandas",
  "numpy",
  "matplotlib",
  "plotly",
  "statsmodels",
  "pmdarima",
  "pyarrow",
  "fastparquet",
  "sqlalchemy",
  "pyodbc",
  "seaborn",
  "requests",
  "beautifulsoup4",
  "selenium",
  "lxml",
  "openpyxl",
  "pdfplumber",
  "pypandoc",
  "xlrd",
  "jupyter",
  "jupyterlab",
  "ipython",
  "jupyter-contrib-nbextensions",
  "papermill",
  "openai",
  "langchain-core",
  "langchain-openai",
  "langsmith",
  "click",
  "tqdm",
  "pyyaml",
  "colorlog",
  "xlwings",
  "msal",
  "python-dotenv",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["aurora_forecasts*"]