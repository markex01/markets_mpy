[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bloomberg"
version = "0.1.0"
description = "Market research utilities for Bloomberg integrations."
requires-python = "==3.10.*"
authors = [
  {name = "Mikel Perez"}
]
dependencies = [
  "pandas",
  "numpy",
  "matplotlib",
  "plotly",
  "statsmodels",
  "pmdarima",
  "pyarrow",
  "fastparquet",
  "sqlalchemy",
  "pyodbc",
  "seaborn",
  "requests",
  "beautifulsoup4",
  "selenium",
  "lxml",
  "openpyxl",
  "pdfplumber",
  "pypandoc",
  "xlrd",
  "jupyter",
  "jupyterlab",
  "ipython",
  "jupyter-contrib-nbextensions",
  "papermill",
  "openai",
  "langchain-core",
  "langchain-openai",
  "langsmith",
  "click",
  "tqdm",
  "pyyaml",
  "colorlog",
  "xlwings",
  "eurostat",
]

[project.optional-dependencies]
bloomberg-terminal = [
  # Bloomberg's blpapi is NOT on PyPI. Install it manually from Bloomberg's SDK for Python 3.10 (cp310).
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["bloomberg*"]
